<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxOS 🇮🇳 — Invoice Entry Capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090d16;
            --surface: rgba(18, 26, 43, 0.7);
            --surface-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --emerald: #10b981;
            --cyan: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            line-height: 1.5;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        header {
            background: rgba(9, 13, 22, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--surface-border); position: sticky; top: 0; z-index: 100;
        }

        .nav-container {
            max-width: 1280px; margin: 0 auto; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-primary), var(--cyan));
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800;
        }
        .logo-title { font-size: 1.4rem; font-weight: 700; color: #fff; }

        .nav-links { display: flex; gap: 8px; }
        .nav-btn { color: var(--text-secondary); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 0.9rem; }
        .nav-btn.active { color: #fff; background: rgba(255, 255, 255, 0.05); }

        .container { max-width: 600px; margin: 3rem auto; padding: 0 1.5rem; }

        .panel {
            background: var(--surface); backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border); border-radius: var(--radius-lg); padding: 2rem;
        }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; }

        input, select {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--surface-border); border-radius: 8px; color: #fff; font-size: 0.95rem;
        }

        .btn {
            width: 100%; background: var(--accent-primary); color: white; border: none;
            padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo-box">
                <div class="logo-icon">⚡</div>
                <div class="logo-title">TaxOS Capture</div>
            </div>
            <nav class="nav-links">
                <a href="/" class="nav-btn">Dashboard</a>
                <a href="/summary" class="nav-btn">Summary & Ledger</a>
                <a href="/capture" class="nav-btn active">Quick Entry</a>
                <a href="/ca" class="nav-btn">CA Practice Suite 💼</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="panel">
            <h2 style="margin-bottom: 0.5rem;">Capture New Invoice</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">
                Records are encrypted locally with AES-GCM and Argon2 keys before writing to your local database.
            </p>
            <form action="/invoice/add" method="POST">
                <div class="form-group">
                    <label>Client / Vendor Name</label>
                    <input type="text" name="vendor" placeholder="e.g. Acme Tech Global" required>
                </div>
                <div class="form-group">
                    <label>Invoice Amount (INR)</label>
                    <input type="number" step="0.01" name="amount" placeholder="250000.00" required>
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" name="date" required>
                </div>
                <button type="submit" class="btn">Encrypt & Save Invoice</button>
            </form>
        </div>
    </main>
</body>
</html>
